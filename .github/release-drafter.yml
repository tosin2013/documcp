name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
categories:
  - title: "🚨 Breaking Changes"
    labels:
      - "breaking-change"
      - "breaking"
      - "major"
  - title: "🚀 Features"
    labels:
      - "feature"
      - "enhancement"
  - title: "🐛 Bug Fixes"
    labels:
      - "fix"
      - "bugfix"
      - "bug"
  - title: "🧪 Tests"
    labels:
      - "test"
  - title: "📚 Documentation"
    labels:
      - "documentation"
      - "docs"
  - title: "🔧 Maintenance"
    labels:
      - "chore"
      - "dependencies"
  - title: "⚡ Performance"
    labels:
      - "performance"
  - title: "🔒 Security"
    labels:
      - "security"
change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&' # You can add # and @ to disable mentions, and add ` to disable code blocks.
# Pre-1.0 SemVer convention: while we are in the 0.x.y era, breaking
# changes are MINOR bumps (0.5.10 -> 0.6.0), not major bumps. SemVer
# section 4 explicitly carves out 0.x.y as "anything MAY change", so
# breaking changes do not require a major bump until we hit 1.0.0.
# This convention is documented in
# docs/development/v0.6.0-release-preview.md (Suggested version bump
# section). When we cut 1.0.0, MOVE "breaking-change" / "breaking" /
# "major" labels back to the `major:` resolver below.
version-resolver:
  major:
    labels:
      - "major"
      # Keep "breaking" / "breaking-change" out of major until post-1.0.
      # Currently routed to `minor` below per the pre-1.0 convention.
  minor:
    labels:
      - "minor"
      - "feature"
      - "enhancement"
      - "breaking"
      - "breaking-change"
  patch:
    labels:
      - "patch"
      - "fix"
      - "bugfix"
      - "bug"
      - "dependencies"
  default: patch
template: |
  ## DocuMCP Release $RESOLVED_VERSION

  ## Changes

  $CHANGES

  ## Installation
  ```bash
  npm install -g documcp@$RESOLVED_VERSION
  ```

  ## System Requirements
  - Node.js 20.x or higher
  - npm 9.x or higher

  ## Quick Start
  ```bash
  # Install globally
  npm install -g documcp

  # Use with MCP client
  documcp analyze-repository --path ./my-project
  ```

  ## Contributors
  $CONTRIBUTORS
