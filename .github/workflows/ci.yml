name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Clean up any existing memory files
        run: rm -rf .documcp

      - name: Type check
        run: npm run typecheck

      - name: Lint code
        run: npm run lint

      - name: Run tests
        run: npm test -- --forceExit

      - name: Clean up memory files before coverage run
        run: rm -rf .documcp

      - name: Save test results JSON
        if: failure() && matrix.node-version == '20.x'
        run: npm test -- --forceExit --json --outputFile=test-results.json 2>/dev/null || true
        continue-on-error: true

      - name: Upload test results artifact
        if: failure() && matrix.node-version == '20.x'
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.json
          if-no-files-found: warn
          retention-days: 7

      - name: Run tests with coverage
        run: npm test -- --coverage --forceExit

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella

      - name: Close resolved test-failure issues
        if: success() && matrix.node-version == '20.x' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'test-failure',
              state: 'open',
              per_page: 100,
            });
            for (const issue of issues) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `All tests are passing on \`main\` as of ${context.sha.slice(0,8)} ([CI run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})). Closing automatically.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }
            core.info(`Closed ${issues.length} test-failure issue(s).`);

      - name: Performance benchmarks
        if: matrix.node-version == '20.x'
        run: npm run test:performance

      - name: Upload performance benchmark artifacts
        if: always() && matrix.node-version == '20.x'
        uses: actions/upload-artifact@v4
        with:
          name: performance-benchmark-results
          path: |
            tests/benchmarks/results/results.json
            tests/benchmarks/results/summary.md
          if-no-files-found: warn

      - name: Post benchmark summary to PR
        if: always() && github.event_name == 'pull_request' && matrix.node-version == '20.x'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'tests/benchmarks/results/summary.md';
            if (!fs.existsSync(path)) {
              core.info('Benchmark summary not found; skipping PR comment.');
              return;
            }

            const body = fs.readFileSync(path, 'utf8');
            const marker = '<!-- documcp-benchmark-summary -->';
            const issue_number = context.payload.pull_request.number;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(
              (comment) =>
                comment.user.type === 'Bot' && comment.body && comment.body.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }

  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Clean up any existing memory files
        run: rm -rf .documcp

      - name: Build project
        run: npm run build

      - name: Verify build output
        run: |
          test -f dist/index.js
          test -f dist/index.d.ts

      - name: Package verification
        run: npm pack --dry-run

  create-failure-issues:
    name: Create Issues for Failed Tests
    runs-on: ubuntu-latest
    needs: test
    if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      issues: write

    steps:
      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: test-results
        continue-on-error: true

      - name: Create GitHub issues for failing tests
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            if (!fs.existsSync('test-results.json')) {
              core.warning('test-results.json not found — skipping issue creation');
              return;
            }

            const results = JSON.parse(fs.readFileSync('test-results.json', 'utf8'));
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            let created = 0;

            for (const suite of results.testResults ?? []) {
              // Jest JSON uses `name` for the file path and `assertionResults` for the test list
              const filePath = suite.testFilePath ?? suite.name ?? '';
              const relPath = filePath.replace((process.env.GITHUB_WORKSPACE ?? '') + '/', '');
              for (const test of suite.assertionResults ?? suite.testResults ?? []) {
                if (test.status !== 'failed') continue;

                const title = `[Test Failure] ${test.fullName}`;
                const errorMsg = (test.failureMessages ?? []).join('\n').slice(0, 2000);

                // Deduplicate: skip if open issue already exists with the same title
                const { data: existing } = await github.rest.issues.listForRepo({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  labels: 'test-failure',
                  state: 'open',
                  per_page: 100,
                });
                if (existing.some(i => i.title === title)) {
                  core.info(`Issue already exists for: ${test.fullName}`);
                  continue;
                }

                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title,
                  labels: ['test-failure', 'bug'],
                  body: [
                    `**Failing test:** \`${test.fullName}\``,
                    `**File:** \`${relPath}\``,
                    `**CI run:** ${runUrl}`,
                    `**Commit:** ${context.sha.slice(0, 8)}`,
                    '',
                    '### Failure message',
                    '```',
                    errorMsg,
                    '```',
                    '',
                    '_This issue was created automatically by CI. It will be closed automatically when the test passes on `main`._',
                  ].join('\n'),
                });
                created++;
                core.info(`Created issue: ${title}`);
              }
            }
            core.info(`Created ${created} issue(s).`);

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run security audit (dev dependencies)
        run: npm audit --audit-level=moderate || echo "⚠️ Some dev dependency vulnerabilities found - see Security tab for details"
        continue-on-error: true

      - name: Check for high severity vulnerabilities (production)
        run: npm audit --audit-level=high --production

  commitlint:
    name: Commit Message Validation
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate commit messages
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
