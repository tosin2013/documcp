name: Deploy Documentation to GitHub Pages

# Single source of truth for GitHub Pages deployment (per ADR-005 and the
# 2026-05-01 cleanup that removed the duplicate docs job from release.yml).
# Fires on every push to main so the docs site reflects the current state of
# main, including documentation-only changes that don't warrant a tagged
# release. Tag pushes do NOT trigger this workflow because the commit they
# point at has already landed on main and been deployed.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent Pages deployment. Don't cancel an in-progress
# deployment so the running one finishes cleanly; subsequent runs queue.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and Deploy Documentation
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate API documentation
        run: npm run docs:generate

      - name: Remove problematic media directory
        run: rm -rf docs/api/media

      - name: Install Docusaurus dependencies
        run: cd docs && npm ci

      - name: Build Docusaurus site
        run: cd docs && npm run build
        env:
          NODE_ENV: production

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./docs/build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
