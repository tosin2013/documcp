name: "Dependency Review"

on: [pull_request]

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v4

      - name: "Dependency Review"
        # v4.4.0 (May 2025) added proper handling of compound SPDX license
        # expressions like "CC0-1.0 AND MIT" (lodash >= 4.18.0 carries this).
        # v3 did literal string matching only, which failed on compound
        # expressions even when each individual license was on the allowlist.
        # See issue #137 for the investigation that led to this upgrade.
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          # Each entry here is a single-license SPDX identifier. With v4,
          # compound expressions in dependencies (A AND B, A OR B) are
          # decomposed and matched element-wise against this list.
          # BlueOak-1.0.0 added 2026-05-01 (PR #141): permissive license
          # adopted by Isaac Schlueter's package family (minimatch >= 10,
          # glob, lru-cache, semver, etc.). Strictly more permissive than
          # MIT in some respects.
          allow-licenses: MIT, Apache-2.0, BSD-3-Clause, BSD-2-Clause, ISC, CC0-1.0, 0BSD, Unlicense, BlueOak-1.0.0
