name: "Dependency Review"

on: [pull_request]

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v4

      - name: "Dependency Review"
        uses: actions/dependency-review-action@v3
        with:
          fail-on-severity: moderate
          # CC0-1.0 added 2026-04-30 (issue #137): public-domain dedication is
          # strictly more permissive than MIT and is carried by current
          # canonical packages such as lodash >= 4.18.0. Apache-2.0 WITH
          # LLVM-exception covers a few transitive build-time deps.
          allow-licenses: MIT, Apache-2.0, BSD-3-Clause, BSD-2-Clause, ISC, CC0-1.0, Apache-2.0 WITH LLVM-exception, 0BSD, Unlicense
